name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core + dev + bench extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,bench]"

      - name: Lint (ruff)
        run: python -m ruff check src bench tests examples

      - name: Type check (mypy --strict on the package)
        run: python -m mypy

      - name: Tests (incl. the domain-agnostic guardrail)
        run: python -m pytest -q

      - name: Benchmark smoke run
        run: python -m bench.run --smoke
