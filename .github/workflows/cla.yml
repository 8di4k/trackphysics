name: CLA Assistant

# Enforces the Contributor License Agreement (CLA.md) on pull requests. Contributors sign
# by commenting the sign-off phrase below; signatures are recorded in a JSON file on the
# `cla-signatures` branch.
#
# SETUP before this works:
#   1. Create a repo (or org) secret `CLA_SIGNATURES_TOKEN` — a PAT with `repo` scope used to
#      store signatures. (`GITHUB_TOKEN` alone cannot push to the signatures branch.)
#   2. Have counsel review CLA.md before relying on it (see BRIEF.md §19).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/8di4k/trackphysics/blob/main/CLA.md
          branch: cla-signatures
          allowlist: dependabot[bot]
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
